name: CI - Train Model and Build Docker

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      # Step 3: Setup Miniconda
      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: '3.12.7'

      # Step 4: Install MLflow
      - name: Install MLflow and dependencies
        run: |
          pip install mlflow==2.19.0
          pip install pandas numpy scikit-learn matplotlib seaborn

      # Step 5: Run MLflow Project
      - name: Run MLflow Project
        working-directory: MLProject
        run: |
          mlflow run . --env-manager=local

      # Step 6: Upload artifacts ke GitHub
      - name: Upload MLflow Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: |
            MLProject/mlruns/
            MLProject/artifacts/

      # Step 7: Commit artifacts ke repository
      - name: Commit artifacts to repository
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --staged --quiet || git commit -m "CI: Update MLflow artifacts"
          git push

      # Step 8: Login ke Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 9: Build Docker image menggunakan mlflow models build-docker
      - name: Build Docker Image with MLflow
        working-directory: MLProject
        run: |
          # Cari run_id terbaru
          LATEST_RUN=$(ls -t mlruns/0/*/meta.yaml 2>/dev/null | head -1 | cut -d'/' -f3)
          if [ -z "$LATEST_RUN" ]; then
            LATEST_RUN=$(ls -t mlruns/*/meta.yaml 2>/dev/null | head -1 | cut -d'/' -f2)
          fi
          echo "Latest run ID: $LATEST_RUN"

          # Build docker image
          mlflow models build-docker \
            -m "mlruns/0/$LATEST_RUN/artifacts/model" \
            -n "wine-quality-model" \
            --enable-mlserver

      # Step 10: Tag dan Push Docker image
      - name: Push Docker Image
        run: |
          docker tag wine-quality-model ${{ secrets.DOCKER_USERNAME }}/wine-quality-model:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/wine-quality-model:latest
